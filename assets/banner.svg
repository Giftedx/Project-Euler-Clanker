<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241a2e"/><stop offset="1" stop-color="#33254a"/></linearGradient></defs>
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- mathematical wallpaper: spaced out, corners only, never colliding -->
  <g fill="#9a86c8" opacity="0.16" font-size="24" font-weight="600" font-family="Georgia,serif" font-style="italic">
    <text x="700" y="60">&#931; n&#178;</text>
    <text x="80" y="330">&#966; = (1+&#8730;5)/2</text>
    <text x="420" y="316">mod p</text>
    <text x="660" y="330">10001st prime</text>
    <text x="836" y="64">e&#185;&#8304;&#8304;</text>
  </g>

  <!-- ART ZONE: the clanker at its blackboard -->
  <!-- blackboard -->
  <g transform="translate(1120,160)">
    <rect x="-100" y="-92" width="200" height="150" rx="8" fill="#1d1526" stroke="#9a86c8" stroke-width="3" opacity="0.95"/>
    <g font-family="Georgia,serif" font-style="italic" fill="#c0b6d8" font-size="20">
      <text x="-82" y="-58">1 + 2 + ... + n</text>
      <text x="-82" y="-26">= n(n+1)/2</text>
      <text x="-82" y="10">answer: 42?</text>
    </g>
    <line x1="-16" y1="16" x2="44" y2="2" stroke="#c03030" stroke-width="3.5" stroke-linecap="round"/>
    <text x="-82" y="44" font-family="Georgia,serif" font-style="italic" fill="#b88f2e" font-size="20">DI container??</text>
  </g>

  <!-- the clanker, looking at its work -->
  <g transform="translate(940,222)">
    <rect x="-52" y="-42" width="104" height="84" rx="13" fill="#8a78b0"/>
    <rect x="-40" y="-28" width="80" height="40" rx="8" fill="#241a2e"/>
    <circle cx="-16" cy="-8" r="7" fill="#b88f2e"/><circle cx="16" cy="-8" r="7" fill="#b88f2e"/>
    <rect x="-11" y="52" width="9" height="16" fill="#8a78b0"/><rect x="2" y="52" width="9" height="16" fill="#8a78b0"/>
    <line x1="0" y1="-42" x2="0" y2="-60" stroke="#8a78b0" stroke-width="5"/><circle cx="0" cy="-66" r="6" fill="#b88f2e"/>
    <!-- arm holding chalk toward the board -->
    <line x1="52" y1="-6" x2="92" y2="-30" stroke="#8a78b0" stroke-width="9" stroke-linecap="round"/>
    <line x1="92" y1="-30" x2="106" y2="-40" stroke="#f5f0e8" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- TEXT ZONE -->
  <text x="80" y="142" font-size="68" font-weight="800" fill="#f5f0e8" letter-spacing="0.5">Project Euler, Clankered</text>
  <text x="84" y="190" font-size="21" font-weight="600" fill="#b88f2e" letter-spacing="3.5">CLASSIC PROBLEMS &#183; C# &#183; RUINED BY A CLANKER</text>
  <text x="84" y="224" font-size="17" font-weight="500" fill="#9a86c8" letter-spacing="2.5">ALTOGETHER TOO MUCH ARCHITECTURE FOR SUMS</text>
</svg>
